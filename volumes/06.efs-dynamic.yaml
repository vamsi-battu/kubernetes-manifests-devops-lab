apiVersion: v1
kind: PersistentVolumeClaim
metadata: 
  name: efs-dynamic
spec:
  storageClassName: "expense-efs"
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 3Gi

---
apiVersion: v1
kind: Pod
metadata: 
  name: efs-dynamic
  labels:
    purpose: efs-dynamic
spec:
  # nodeSelector:
  #   topology.kubernetes.io/zone: us-east-1b
  containers: 
  - name: nginx
    image: nginx
    volumeMounts: 
    - name: efs-dynamic
      mountPath: /usr/share/nginx/html
  volumes:
  - name: efs-dynamic
    persistentVolumeClaim:
      claimName: efs-dynamic

---
apiVersion: v1
kind: Service
metadata:
  name:  nginx
spec:
  type: LoadBalancer
  selector: 
    purpose: efs-dynamic
  ports: 
    - name: nginx-service-port
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30007