apiVersion: v1
kind: PersistentVolume
metadata:
  name: ebs-static
spec:
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 20Gi
  csi:
    driver: ebs.csi.aws.com
    fsType: ext4
    volumeHandle: vol-0f58cb145fa077b5b
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: 
  name: ebs-static-claim
spec:
  storageClassName:
  volumeName: ebs-static
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: Pod
metadata: 
  name: ebs-static-pod
  labels:
    purpose: ebs-static
spec:
  nodeSelector:
    topology.kubernetes.io/zone: us-east-1b
  containers: 
  - name: nginx
    image: nginx
    volumeMounts: 
    - name: ebs-static
      mountPath: /usr/share/nginx/html
  volumes:
  - name: ebs-static
    persistentVolumeClaim:
      claimName: ebs-static-claim 

---
apiVersion: v1
kind: Service
metadata:
  name:  nginx
spec:
  type: LoadBalancer
  selector: 
    purpose: ebs-static
  ports: 
    - name: nginx-service-port
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30007