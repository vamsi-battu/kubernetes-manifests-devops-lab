apiVersion: v1
kind: PersistentVolume
metadata:
  name: expense-efs
spec:
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: efs.csi.aws.com
    volumeHandle: fs-044331062d89b8263

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: 
  name: expense-efs
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName:
  volumeName: expense-efs 
  resources:
    requests:
      storage: 3Gi

---
apiVersion: v1
kind: Pod
metadata: 
  name: efs-static
  labels:
    purpose: efs-static
spec:
  containers: 
  - name: nginx
    image: nginx
    volumeMounts: 
    - name: expense-efs
      mountPath: /usr/share/nginx/html
  volumes:
  - name: expense-efs
    persistentVolumeClaim:
      claimName: expense-efs

---
apiVersion: v1
kind: Service
metadata:
  name:  nginx
spec:
  type: LoadBalancer
  selector: 
    purpose: efs-static
  ports: 
    - name: nginx-service-port
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30007